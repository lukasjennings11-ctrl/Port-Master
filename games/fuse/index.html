<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0c1020" />
  <meta name="description" content="Swipe to fuse matching tiles and chase 2048. A browser puzzle game — no install needed." />
  <meta property="og:title" content="Fuse" />
  <meta property="og:description" content="Swipe to fuse matching tiles and chase 2048." />
  <title>Fuse — merge puzzle</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="loader">
    <div class="logo">FUSE</div>
    <div class="spinner" aria-label="Loading"></div>
  </div>
  <div id="app">
    <header class="hud">
      <span class="brand">FUSE</span>
      <div class="scores">
        <div class="score"><span class="label">SCORE</span><span id="score">0</span></div>
        <div class="score"><span class="label">BEST</span><span id="best">0</span></div>
      </div>
    </header>
    <div class="subbar">
      <div class="streak" id="streak">🔥 0&nbsp;day streak</div>
      <div class="controls">
        <button id="mute" class="icon-btn" aria-label="Toggle sound">🔊</button>
        <button id="new" class="text-btn">New</button>
      </div>
    </div>
    <div class="board-wrap">
      <canvas id="game" aria-label="Fuse game board"></canvas>

      <!-- first-run how-to-play -->
      <div id="intro" class="overlay hidden" role="dialog" aria-modal="true">
        <div class="panel">
          <h1>How to play</h1>
          <ul class="howto">
            <li><b>Swipe</b> or use <b>arrow keys</b> to slide all tiles.</li>
            <li>Tiles with the <b>same number</b> fuse into one.</li>
            <li>Reach the <b>2048</b> tile — then keep climbing.</li>
          </ul>
          <button id="intro-go" class="cta">Play</button>
        </div>
      </div>

      <!-- game over / win -->
      <div id="overlay" class="overlay hidden" role="dialog" aria-modal="true">
        <div class="panel">
          <h1 id="ov-title">Game Over</h1>
          <p id="ov-sub">No moves left.</p>
          <div class="ov-scores">
            <div><span class="label">SCORE</span><b id="ov-score">0</b></div>
            <div><span class="label">BEST</span><b id="ov-best">0</b></div>
          </div>
          <button id="ov-again" class="cta">Play again</button>
          <button id="ov-continue" class="cta secondary" style="display:none">Continue ▶</button>
          <button id="ov-share" class="cta secondary" style="display:none">Share score</button>
        </div>
      </div>
    </div>
    <p class="hint">Swipe or use <b>arrow keys</b> — merge matching tiles to reach <b>2048</b>.</p>
  </div>
  <script src="../../shared/juice.js?v=1"></script>
  <script src="../../shared/retention.js?v=1"></script>
  <script src="../../shared/portal.js?v=1"></script>
  <script src="game.js?v=1"></script>
</body>
</html>
