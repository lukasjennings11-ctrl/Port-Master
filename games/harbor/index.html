<body class="paperui">
  <div id="loader"><div class="logo">Port Boss</div><div class="spinner" aria-label="Loading"></div></div>
  <div id="app">
    <header class="hud">
      <span class="brand">Port Boss</span>
      <span class="era" id="era-pill">Fishing Village</span>
      <span class="clock" id="clock">06:00</span>
    </header>
    <div class="board-wrap">
      <canvas id="game" aria-label="Port Boss port"></canvas>
    </div>
    <p class="hint" id="hint">Drag to travel the coast · scroll or pinch to zoom · right-drag or twist to rotate</p>
  </div>
  <script src="../../shared/juice.js?v=1"></script>
  <script src="../../shared/retention.js?v=1"></script>
  <script src="../../shared/portal.js?v=5"></script>
  <script src="../../shared/progression.js?v=1"></script>
  <script src="../../shared/stage.js?v=1"></script>
  <script src="gl.js?v=95"></script>
  <script src="gltf.js?v=95"></script>
  <script src="biomes.js?v=95"></script>
  <script src="assets.js?v=95"></script>
  <script src="models.js?v=95"></script>
  <script src="sim.js?v=95"></script>
  <script src="ads.js?v=95"></script>
  <script src="game.js?v=95"></script>
  <script>
    // Register the Port Boss service worker so the game installs as a
    // standalone app and runs fully offline once cached. Skipped entirely in
    // portal mode (?portal=...) — portals embed the game in an iframe/host
    // page and disallow service workers registering there (Phase 12b).
    if ('serviceWorker' in navigator && !/[?&]portal=/.test(location.search)) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function () {});
      });
    }
  </script>
</body>
