<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#05030f" />
  <meta name="description" content="PRISM — spin the prism so each beam of light meets its matching color. A neon refraction reflex arcade game. Free, no install." />
  <meta property="og:title" content="PRISM" />
  <meta property="og:description" content="Spin the prism. Match the light. Don't crack." />
  <title>PRISM — neon refraction arcade</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="loader"><div class="logo">PRISM</div><div class="spinner" aria-label="Loading"></div></div>
  <div id="app">
    <header class="hud">
      <span class="brand">PRISM</span>
      <div class="scores">
        <div class="score-box"><span class="label">SCORE</span><span id="score">0</span></div>
        <div class="score-box"><span class="label">BEST</span><span id="best">0</span></div>
      </div>
    </header>
    <div class="subbar">
      <div class="stat" id="shields" aria-label="Shields">◆ ◆ ◆</div>
      <div class="stat wave" id="wave">WAVE 1</div>
      <div class="controls">
        <button id="menu" class="icon-btn" aria-label="Missions">☰</button>
        <button id="mute" class="icon-btn" aria-label="Toggle sound">🔊</button>
        <button id="new"  class="text-btn">Restart</button>
      </div>
    </div>
    <div class="board-wrap">
      <canvas id="game" aria-label="PRISM game board"></canvas>
      <div id="crt" aria-hidden="true"></div>
      <div id="overlay" class="overlay hidden" role="dialog" aria-modal="true">
        <div class="panel">
          <h1 id="ov-title">Shattered</h1>
          <p  id="ov-sub">The prism cracked.</p>
          <div class="ov-scores">
            <div><span class="label">Score</span><b id="ov-score">0</b></div>
            <div><span class="label">Best</span><b id="ov-best">0</b></div>
          </div>
          <button id="ov-again" class="cta">Play again</button>
          <button id="ov-continue" class="cta secondary" style="display:none">Continue ▶</button>
        </div>
      </div>
    </div>
    <p class="hint">Drag <b>left / right</b> (or <b>← →</b>) to spin the prism — meet each beam with its color.</p>
  </div>
  <script src="../../shared/juice.js?v=1"></script>
  <script src="../../shared/retention.js?v=1"></script>
  <script src="../../shared/portal.js?v=1"></script>
  <script src="../../shared/progression.js?v=1"></script>
  <script src="../../shared/stage.js?v=1"></script>
  <script src="game.js?v=1"></script>
</body>
</html>
